# CI/CD Pipeline for Inventory Management System Backend
# This pipeline automates building, testing, static analysis, security scanning, and deployment
# Triggered on push to main and pull requests for continuous integration

name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================
  # CI Stage: Build, Test, Analyze, and Scan
  # This stage runs on every push and pull request
  # ============================================================
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout source code from repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Java 17 runtime environment with Maven caching
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Step 3: Build the project and run unit tests
      - name: Build and Test
        run: mvn clean verify -B

      # Step 4: Run SpotBugs static analysis for bug detection
      - name: Run SpotBugs Analysis
        run: mvn spotbugs:spotbugs -B
        continue-on-error: true

      # Step 5: Run PMD static analysis for code quality
      - name: Run PMD Analysis
        run: mvn pmd:pmd -B
        continue-on-error: true

      # Step 6: Run Semgrep OWASP security scanning
      # Using Semgrep with OWASP rulesets for comprehensive security vulnerability detection
      - name: Run Semgrep Security Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/java
            p/security-audit
        continue-on-error: true

      # Step 7: Generate JaCoCo code coverage report
      - name: Generate Code Coverage Report
        run: mvn jacoco:report -B

      # Step 8: Upload SpotBugs analysis report as artifact for documentation
      - name: Upload SpotBugs Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: target/spotbugs/

      # Step 9: Upload PMD analysis report as artifact
      - name: Upload PMD Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: target/pmd.xml

      # Step 10: Upload JaCoCo code coverage report as artifact
      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/

      # Step 11: Upload built JAR artifact for deployment stage
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar

  # ============================================================
  # CD Stage: Deploy to AWS EC2
  # This stage only runs on push to main branch (not on PRs)
  # ============================================================
  cd:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Step 1: Download the built JAR from CI stage
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: ./artifact

      # Step 2: Upload JAR to EC2 via SCP (must happen before SSH deploy)
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./artifact/*.jar"
          target: "/tmp/"
          strip_components: 1

      # Step 3: Deploy backend JAR on EC2 instance via SSH
      # Uses appleboy/ssh-action to securely connect and deploy
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            # Create systemd service if it does not exist
            if [ ! -f /etc/systemd/system/inventory-backend.service ]; then
              echo "Creating systemd service..."
              sudo tee /etc/systemd/system/inventory-backend.service > /dev/null <<'SERVICE'
            [Unit]
            Description=Inventory Management Backend
            After=network.target
            [Service]
            Type=simple
            User=ubuntu
            ExecStart=/usr/bin/java -jar /opt/inventory-backend/app.jar --spring.profiles.active=prod
            Restart=on-failure
            RestartSec=10
            [Install]
            WantedBy=multi-user.target
            SERVICE
              sudo systemctl daemon-reload
              sudo systemctl enable inventory-backend
            fi
            # Stop existing application if running
            sudo systemctl stop inventory-backend || true
            sleep 2
            # Create application directory if it does not exist
            sudo mkdir -p /opt/inventory-backend
            # Remove old JAR to avoid conflicts
            sudo rm -f /opt/inventory-backend/app.jar
            # Find and copy the new JAR file
            JAR_FILE=$(find /tmp -maxdepth 1 -name '*.jar' -type f | head -1)
            if [ -z "$JAR_FILE" ]; then echo "ERROR: No JAR found in /tmp"; exit 1; fi
            echo "Deploying: $JAR_FILE"
            sudo cp "$JAR_FILE" /opt/inventory-backend/app.jar
            sudo rm -f "$JAR_FILE"
            # Set ownership
            sudo chown ubuntu:ubuntu /opt/inventory-backend/app.jar
            # Restart the application using systemd
            sudo systemctl restart inventory-backend
            # Wait for application to start
            sleep 15
            # Verify the app is running
            sudo systemctl is-active inventory-backend

      # Step 4: Smoke test - verify the deployed application is responding
      - name: Smoke Test
        run: |
          sleep 15
          curl -sf --retry 3 --retry-delay 10 http://${{ secrets.EC2_HOST }}:8080/api/auth/login -H "Content-Type: application/json" -d '{"username":"admin","password":"admin123"}'
          echo "Smoke test passed"
