# CI/CD Pipeline for Smart Recipe Meal Planner Backend
# Triggers on push to main and pull requests for continuous integration
# Deploys to AWS EC2 only on push to main branch
name: Backend CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ==================== CI STAGE ====================
  # Runs on every push and pull request
  # Compiles code, runs tests, static analysis, and security scanning
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout source code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Java 17 with Maven caching for faster builds
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Step 3: Compile the project and run all unit tests
      - name: Build and Test
        run: mvn clean test -B

      # Step 4: Run static analysis (SpotBugs with FindSecBugs, PMD) and generate JaCoCo coverage
      - name: Run Static Analysis and Code Coverage
        run: mvn verify -B -DskipTests

      # Step 5: Run Trivy vulnerability scanner on the project filesystem
      # Replaces OWASP Dependency-Check for security vulnerability detection
      - name: Security Vulnerability Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          output: 'trivy-report.txt'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      # Step 6: Upload SpotBugs analysis report as CI artifact
      - name: Upload SpotBugs Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: target/spotbugs/

      # Step 7: Upload PMD analysis report as CI artifact
      - name: Upload PMD Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: target/pmd*

      # Step 8: Upload JaCoCo code coverage report as CI artifact
      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/

      # Step 9: Upload Trivy security scan report as CI artifact
      - name: Upload Trivy Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-security-report
          path: trivy-report.txt

      # Step 10: Upload the packaged JAR as a build artifact for deployment
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-jar
          path: target/*.jar

  # ==================== CD STAGE ====================
  # Runs only on push to main branch (not on PRs)
  # Deploys the backend JAR to AWS EC2 via SSH
  cd:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Step 1: Download the build artifact from CI stage
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: deploy/

      # Step 2: Deploy JAR to EC2 via SSH and restart the application
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Stop existing application if running
            sudo systemctl stop mealplanner || true
            # Create application directory if it does not exist
            sudo mkdir -p /opt/mealplanner
            sudo chown ec2-user:ec2-user /opt/mealplanner

      # Step 3: Copy JAR file to EC2 instance
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/*.jar"
          target: "/opt/mealplanner/"
          strip_components: 1

      # Step 4: Start the application on EC2
      - name: Start Application on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Start the Spring Boot application using systemd
            sudo systemctl start mealplanner
            # Wait for application to start up
            sleep 30

      # Step 5: Smoke test to verify deployment was successful
      - name: Smoke Test - Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Verify the health endpoint returns HTTP 200
            curl -f http://localhost:8080/api/health || exit 1
            echo "Health check passed - deployment successful"
