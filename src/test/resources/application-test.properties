# H2 in-memory database for test execution without requiring PostgreSQL
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Create and drop schema for each test run to ensure clean state
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT configuration for test environment
app.jwt.secret=TestSecretKeyForJWTAuthenticationInTestEnvironment2024SecureString
app.jwt.expiration-ms=86400000

# Disable SQL logging during tests for cleaner output
spring.jpa.show-sql=false
logging.level.com.mealplanner.api=WARN
