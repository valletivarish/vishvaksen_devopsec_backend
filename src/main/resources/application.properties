# Application name and server configuration
spring.application.name=meal-planner-api
server.port=8080

# PostgreSQL database connection settings for local development
spring.datasource.url=jdbc:postgresql://localhost:5432/mealplanner
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate settings - update mode preserves existing data
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT authentication configuration
app.jwt.secret=VishvaksenMachana25173421SmartRecipeMealPlannerSecretKeyForJWTAuthentication2024SecureRandomString
app.jwt.expiration-ms=86400000

# SpringDoc OpenAPI / Swagger UI configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging configuration for development
logging.level.com.mealplanner.api=DEBUG
logging.level.org.springframework.security=INFO
